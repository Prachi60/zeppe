<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect width="200" height="200" fill="#FFFFFF" rx="20"/>
  <defs>
    <linearGradient id="doveGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9D4EDD;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7209B7;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Dove Bird -->
  <circle cx="100" cy="100" r="65" fill="url(#doveGrad)"/>
  <!-- Bird shape -->
  <ellipse cx="100" cy="85" rx="12" ry="18" fill="#FFFFFF"/>
  <!-- Wings -->
  <path d="M 90 85 Q 75 80 70 95" stroke="#FFFFFF" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 110 85 Q 125 80 130 95" stroke="#FFFFFF" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Head -->
  <circle cx="100" cy="75" r="8" fill="#FFFFFF"/>
  <circle cx="102" cy="73" r="2" fill="#000000"/>
  <!-- Body -->
  <ellipse cx="100" cy="110" rx="10" ry="16" fill="#FFFFFF"/>
  <text x="100" y="160" font-size="22" font-weight="bold" text-anchor="middle" fill="#7209B7" font-family="Arial">DOVE</text>
</svg>
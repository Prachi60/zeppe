<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect width="200" height="200" fill="#FFFFFF" rx="20"/>
  <defs>
    <radialGradient id="pepsiGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#DD0000;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0066CC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#004B9E;stop-opacity:1" />
    </radialGradient>
  </defs>
  <!-- Pepsi Globe -->
  <circle cx="100" cy="100" r="65" fill="url(#pepsiGrad)"/>
  <!-- Pepsi White Swoosh -->
  <path d="M 80 80 Q 100 120 120 90" stroke="#FFFFFF" stroke-width="6" fill="none" stroke-linecap="round"/>
  <circle cx="100" cy="100" r="55" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <text x="100" y="165" font-size="20" font-weight="bold" text-anchor="middle" fill="#004B9E" font-family="Arial">PEPSI</text>
</svg>
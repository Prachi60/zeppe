<body>
  <div id="root"></div>
  <script>
    // Fix for 100vh on mobile browsers
    const vh = () => {
      let vh = window.innerHeight * 0.01;
      document.documentElement.style.setProperty('--vh', `${vh}px`);
    };
    window.addEventListener('resize', vh);
    vh();
  </script>
  <script type="module" src="/src/main.jsx"></script>
</body>
